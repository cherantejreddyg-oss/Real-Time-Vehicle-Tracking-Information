<!DOCTYPE html>
<html>
<head>
<title>Vehicle Monitoring System - Login</title>

<style>

body{
font-family: Arial, sans-serif;
background: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center center/cover;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:350px;
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
text-align:center;
}

.container img{
width:90px;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

input:focus{
border-color:#2c7be5;
outline:none;
}

button{
width:95%;
padding:12px;
margin-top:10px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a5edb;
}

a{
text-decoration:none;
color:#2c7be5;
font-weight:bold;
}

.vehicle-icons{
margin-top:15px;
}

.vehicle-icons img{
width:40px;
margin:5px;
}

</style>
</head>

<body>

<div class="container">

<!-- Vehicle logo -->
<img src="https://cdn-icons-png.flaticon.com/512/743/743922.png" alt="vehicle">

<h2>Vehicle Monitoring Login</h2>

<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>New User? <a href="register.html">Register</a></p>

<!-- Vehicle images -->
<div class="vehicle-icons">
<img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995502.png">
<img src="https://cdn-icons-png.flaticon.com/512/743/743007.png">
</div>

</div>

<script>

function login(){
window.location.href="dashboard.html";
}

</script>

</body>
</html>
