<!DOCTYPE html>
<html>
<head>

<title>Vehicle Tracking Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c7be5;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

nav{
background:#1f4e79;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

#map{
height:400px;
border-radius:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<header>
🚗 Real-Time Vehicle Tracking System
</header>

<nav>
<a href="#">Dashboard</a>
<a href="#">History</a>
<a href="index.html">Logout</a>
</nav>

<div class="container">

<h3>Vehicle Live Location</h3>

<div id="map"></div>

<h3>Vehicle History</h3>

<table>

<tr>
<th>Vehicle</th>
<th>Date</th>
<th>Time</th>
<th>Latitude</th>
<th>Longitude</th>
</tr>

<tr>
<td>AP09AB1234</td>
<td>2026-03-06</td>
<td>10:30</td>
<td>17.3850</td>
<td>78.4867</td>
</tr>

<tr>
<td>AP09AB1234</td>
<td>2026-03-06</td>
<td>10:45</td>
<td>17.3900</td>
<td>78.4900</td>
</tr>

</table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// Generate random latitude and longitude
var lat = 15 + Math.random() * 10;
var lon = 75 + Math.random() * 10;

// Create map
var map = L.map('map').setView([lat, lon], 8);

// Add map layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// Add vehicle marker
var marker = L.marker([lat,lon]).addTo(map);

marker.bindPopup("Vehicle Location<br>Lat: " + lat.toFixed(4) +
"<br>Lon: " + lon.toFixed(4)).openPopup();

</script>

</body>
</html>
